[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nxuskit-py"
version = "1.0.5"
description = "Python SDK for nxusKit — pure-Python providers with optional SDK-bundle native engines"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT OR Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
authors = [
    {name = "nxusKit Contributors"}
]
keywords = ["llm", "api", "claude", "openai", "ollama", "groq", "xai", "grok", "mistral", "fireworks", "together", "perplexity", "tool-calling", "function-calling", "streaming", "vision", "clips", "solver", "bayesian"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "requests>=2.32.0",
    "cffi>=2.0.0",
    "keyring>=25.7.0",
    "PyJWT[crypto]>=2.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0",
    "pytest-httpserver>=1.0.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.0",
]

[project.urls]
Homepage = "https://nxus.systems"
Documentation = "https://docs.nxus.systems/nxuskit/"
Repository = "https://github.com/nxus-SYSTEMS/nxusKit"
Issues = "https://github.com/nxus-SYSTEMS/nxusKit/issues"
Changelog = "https://github.com/nxus-SYSTEMS/nxusKit/blob/main/CHANGELOG.md"
"SDK Downloads" = "https://github.com/nxus-SYSTEMS/nxusKit/releases"
Examples = "https://docs.nxus.systems/nxuskit/examples/"

[tool.hatch.build.targets.wheel]
packages = ["src/nxuskit"]

[tool.hatch.build.targets.sdist]
include = ["src/", "README.md", "pyproject.toml", "LICENSE", "NOTICE"]
exclude = [".venv*/", "dist/", "build/", "*.egg-info/"]

[tool.ruff]
line-length = 100
target-version = "py311"
# Exclude auto-generated single-file bundle
exclude = ["nxuskit_bundle.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# Ignore line-too-long in tests (test data like base64 strings, JSON payloads)
per-file-ignores = { "tests/**" = ["E501"] }

[tool.coverage.run]
omit = [
    # FFI wrappers require the native nxuskit library at runtime;
    # they are tested in integration CI with the library available.
    "src/nxuskit/_ffi.py",
    "src/nxuskit/_ffi_provider.py",
    "src/nxuskit/_bn_ffi.py",
    "src/nxuskit/bn.py",
    "src/nxuskit/_solver_ffi.py",
    "src/nxuskit/solver.py",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short"
markers = [
    "contract: contract/integration tests with mocked HTTP",
    "integration: integration tests with live APIs",
    "unit: unit tests",
]
