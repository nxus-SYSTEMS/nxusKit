[package]
name = "nxuskit"
version = "1.0.5"
edition = "2024"
rust-version = "1.93"
authors = ["nxusKit Contributors"]
license = "MIT OR Apache-2.0"
description = "Ergonomic Rust wrapper over the pre-built nxusKit C ABI SDK"
repository = "https://github.com/nxus-SYSTEMS/nxusKit"
readme = "README.md"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.49", features = ["sync", "rt"] }
futures-core = "0.3"
async-trait = "0.1"
semver = "1.0"

# Optional: runtime dynamic library loading (default)
libloading = { version = "0.9", optional = true }

[features]
default = ["dynamic-link"]
dynamic-link = ["dep:libloading"]
static-link = []

[dev-dependencies]
tokio = { version = "1.49", features = ["macros", "rt-multi-thread"] }
tokio-test = "0.4"

[[bench]]
name = "logprobs_serialization"
harness = false

[lints.rust]
unused_must_use = "warn"
unused_imports = "warn"
unused_variables = "warn"
dead_code = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
