[package]
name = "nxuskit-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "JSON-first control plane for shell automation, CI, and multi-engine reasoning workflows"
exclude = ["../../internal/"]

[lints.rust]
unused_must_use = "warn"
unused_imports = "warn"
unused_variables = "warn"
dead_code = "warn"
unreachable_code = "warn"
unreachable_patterns = "warn"
missing_docs = "allow"
missing_debug_implementations = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
complexity = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
dbg_macro = "warn"
todo = "warn"
unimplemented = "warn"
unwrap_used = "allow"
expect_used = "allow"
panic = "warn"
print_stdout = "allow"
print_stderr = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

[features]
default = []
pro-engines = [
    "nxuskit-core/provider-zen",
    "nxuskit-core/provider-z3",
    "nxuskit-engine/provider-zen",
    "nxuskit-engine/provider-z3",
]

[dependencies]
nxuskit-engine = { path = "../nxuskit-engine" }
nxuskit-core = { path = "../nxuskit-core", default-features = false }
clips-sys = { path = "../clips-sys" }
tokio = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
futures = { workspace = true }
open = { workspace = true }
strsim = "0.11"
uuid = { workspace = true }
chrono = { workspace = true }
serde_yaml_ng = { workspace = true }
jsonschema = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
serde_json = { workspace = true }
serde_yaml_ng = { workspace = true }
