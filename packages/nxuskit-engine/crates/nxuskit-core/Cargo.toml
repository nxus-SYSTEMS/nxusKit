[package]
name = "nxuskit-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[features]
default = []
provider-local-llama = ["nxuskit-engine/provider-local-llama"]
provider-local-mistralrs = ["nxuskit-engine/provider-local-mistralrs"]
provider-z3 = []
provider-zen = []
full = ["nxuskit-engine/blocking-api", "nxuskit-engine/provider-local-llama", "nxuskit-engine/provider-local-mistralrs"]

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[dependencies]
nxuskit-engine = { path = "../nxuskit-engine" }
clips-sys = { path = "../clips-sys" }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
slotmap = { workspace = true }
lru = { workspace = true }
parking_lot = { workspace = true }
tokio-util = { version = "0.7", features = ["rt"] }
futures = { workspace = true }
ed25519-dalek = { version = "2.2", features = ["std"] }
base64 = { workspace = true }
libloading = "0.9"
sha2 = { workspace = true }
keyring = "3.6"
rand = "0.10"
jsonwebtoken = { workspace = true }
machine-uid = { workspace = true }
open = { workspace = true }
reqwest = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }


[dev-dependencies]
tempfile = "3"
p256 = { workspace = true }
criterion = { workspace = true }
wiremock = { workspace = true }

[[bench]]
name = "license_bench"
harness = false

[[bench]]
name = "license_offline_check"
harness = false

[build-dependencies]
cbindgen = "0.29"
serde = { version = "1.0", features = ["derive"] }
serde_yaml_ng = "0.10"

[lints]
workspace = true
