language = "C"
include_guard = "NXUSKIT_H"
no_includes = true
sys_includes = []
includes = []
line_length = 100
style = "both"

header = "/* Warning: this file is autogenerated by cbindgen. Do not modify. */"
trailer = ""

after_includes = """
#include <stdint.h>
#include <stdbool.h>
"""

[export]
include = ["NxuskitStreamCallback", "NxuskitStreamDoneCallback"]

[fn]
rename_args = "None"

[enum]
rename_variants = "QualifiedScreamingSnakeCase"

[parse]
parse_deps = false
