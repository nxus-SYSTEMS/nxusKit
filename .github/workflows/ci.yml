# Lightweight CI for the public nxusKit repo.
# Synced by the publish-to-public workflow.
#
# This repo contains exported SDK source (packages/) plus the public Community
# Edition build entry point. Full Pro/internal CI runs upstream; this workflow
# keeps the public CE checkout buildable and covers lightweight language checks.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: '1.26'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      trusted_mirror_push: ${{ steps.trust.outputs.trusted_mirror_push }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect trusted mirror push
        id: trust
        run: |
          set -eu -o pipefail
          trusted="false"
          if [[ "${{ github.event_name }}" == "push" && \
                "${{ github.ref }}" == "refs/heads/main" && \
                "${{ github.event.head_commit.committer.email }}" == "mirror@nxuskit.local" ]]; then
            trusted="true"
          fi
          echo "trusted_mirror_push=${trusted}" >> "$GITHUB_OUTPUT"
          echo "Trusted mirror push: ${trusted}"
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            source:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'packages/nxuskit-engine/**'
              - 'packages/nxuskit/**'
              - 'packages/nxuskit-go/**'
              - 'packages/nxuskit-py/**'
              - 'scripts/**'
              - 'tools/**'
              - 'conformance/**'
              - 'sdk-packaging/**'
              - '!sdk-packaging/docs/**'
              - '.github/workflows/ci.yml'
            go:
              - 'packages/nxuskit-go/**'
            python:
              - 'packages/nxuskit-py/**'

  public-docs-check:
    name: Public docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check public Markdown
        run: |
          set -eu -o pipefail
          FORBIDDEN_TERMS=(
            "deferral register"
            "deferral registry"
            "deferred-v"
            "v0.9.4-deferral-register"
            "### Deferred"
            "**Status**: Deferred"
            "deferred from v"
            "deferred to v"
            "deferred beyond v"
            "Deferred indefinitely"
          )

          for term in "${FORBIDDEN_TERMS[@]}"; do
            hits=$(find . \
              -path './.git' -prune -o \
              -type f \( -name '*.md' -o -name '*.mdx' \) \
              -print0 | xargs -0 grep -F -n "$term" 2>/dev/null || true)
            if [ -n "$hits" ]; then
              echo "$hits"
              echo "::error::Forbidden public Markdown term found: $term"
              exit 1
            fi
          done

  ce-boundary:
    name: Community Edition boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify public CE boundary
        run: bash scripts/assert-public-ce-clean.sh

  ce-source-build:
    name: Community Edition source build
    needs: [changes, ce-boundary]
    if: needs.changes.outputs.source == 'true' && needs.changes.outputs.trusted_mirror_push != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: packages/nxuskit-go/go.sum
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build and QA
        run: |
          bash scripts/ci-install-rust-native-prereqs.sh
          make qa

  ce-bundle-smoke:
    name: Community Edition bundle smoke
    needs: [changes, ce-source-build]
    if: needs.changes.outputs.source == 'true' && needs.changes.outputs.trusted_mirror_push != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release-like CE bundle
        run: |
          bash scripts/ci-install-rust-native-prereqs.sh
          make bundle
          CLI_BIN=$(find dist -path '*/bin/nxuskit-cli' -type f | head -n 1)
          test -n "$CLI_BIN"
          "$CLI_BIN" --version
          MANIFEST=$(find dist -name capability-manifest.json -type f | head -n 1)
          test -n "$MANIFEST"
          jq -e '.edition == "oss" and .domains.solver == false and .domains.zen == false' "$MANIFEST"

  # Go checks — packages/nxuskit-go has CGo files (CLIPS, FFI) that require
  # native SDK libraries. CGO_ENABLED=0 skips CGo compilation. Full CGo
  # vet/build runs upstream and in SDK bundle QA.
  fmt-go:
    name: Format (Go)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Check formatting
        run: |
          cd packages/nxuskit-go
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Unformatted Go files:"
            echo "$UNFORMATTED"
            exit 1
          fi

  vet-go:
    name: Vet (Go)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: packages/nxuskit-go/go.sum
      - name: Vet
        run: |
          cd packages/nxuskit-go
          CGO_ENABLED=0 go vet ./...

  # Python checks — packages/nxuskit-py is pure Python
  lint-python:
    name: Lint (Python)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install tools
        run: pip install ruff
      - name: Ruff check
        run: |
          cd packages/nxuskit-py
          ruff check .

  fmt-python:
    name: Format (Python)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install tools
        run: pip install ruff
      - name: Ruff format check
        run: |
          cd packages/nxuskit-py
          ruff format --check .
